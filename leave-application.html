<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Leave Request</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #fefeff, #2b2b35);
      color: #ddd;
    }

    .container {
      background: rgba(40, 40, 50, 0.95);
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.5);
      width: 80%;
      top: 10%;
      max-width: 600px;
      margin-left: 270px;
      margin-right: 20px;
    }

    h1 {
      text-align: start;
      color: #302e2e;
      margin-left: 270px;
      margin-right: 20px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-top: 10px;
      color: #bbb;
    }

    input, select, textarea {
      width: calc(100% - 20px);
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #444;
      border-radius: 6px;
      outline: none;
      background: #222;
      color: #ddd;
    }

    textarea {
      height: 100px;
      resize: none;
    }

    button {
      display: block;
      background: #007bff;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      text-align: center;
      margin-top: 15px;
      width: 100%;
    }

    button:hover {
      background: #0056b3;
    }

    .cancel-button {
      background: #dc3545;
    }

    .cancel-button:hover {
      background: #c82333;
    }

    .back-button {
      background: #9c7e23;
      color: black;
      margin-top: 10px;
    }

    .back-button:hover {
      background: #977409;
    }
    .sidebar {
        width: 200px;
        background: #333;
        color: white;
        height: 100%;
        padding: 20px;
        margin: 0;
        left: 0;
        top:0;
        position: fixed;
      }

      .sidebar h2 {
        text-align: center;
        margin-bottom: 20px;
      }

      .sidebar ul {
        list-style: none;
        text-align: left;
        padding: 0;
      }
      .sidebar ul li {
        padding: 15px;
        margin-bottom: 10px;
        cursor: pointer;
        border-left: 2px solid transparent;
        transition: background 0.3s, border-color 0.3s;
      }
    .sidebar ul li:hover,
      .sidebar ul li.active {
        background: rgba(255, 255, 255, 0.2);
        border-left: 4px solid white;
      }

      .sidebar ul li a {
        text-decoration: none;
        color: white;
        display: block;
      }
      .main {
        margin-left: 250px;
        padding: 20px;
        flex: 1;
        background: #f9f9fb;
      }

  </style>
</head>
<body>
  <div class="sidebar">
    <h2>SCHEDULIZER</h2>
    <ul>
      <li><a href="home.html">🏠 Home</a></li>
      <li><a href="courseallocation.html">👩‍🏫 Course Allocation</a></li>
      <li><a href="javas.html">📝 Timetable Inputs</a></li>
      <li><a href="schedules.html">📅 Schedules</a></li>
      <li class="active"><a href="leave-application.html">🛑 Staff Leave Application</a></li>
      <li><a href="logout.html">🚪 Logout</a></li>
    </ul>
  </div>
  <h1>Staff Leave Request</h1>
  <div class="container">
    

    <form id="leaveForm">
      <label for="name">Staff Name:</label>
      <input type="text" id="name" name="name" required>

      <label for="department">Department:</label>
      <select id="department" name="department" required>
        <option value="">Select Department</option>
        <option value="BCA">BCA</option>
        <option value="B.sc- CS">B.sc- CS</option>
        <option value="B.sc- IT">B.sc- IT</option>
        <option value="B.com">B.com</option>
        <option value="CSE">CSE</option>
        <option value="ECE">ECE</option>
        <option value="EEE">EEE</option>
        <option value="Mechanical">Mechanical</option>
        <option value="Civil">Civil</option>
      </select>

      <label for="leaveType">Leave Type:</label>
      <select id="leaveType" name="leaveType" required>
        <option value="">Select Leave Type</option>
        <option value="Sick Leave">Sick Leave</option>
        <option value="Casual Leave">Casual Leave</option>
        <option value="Earned Leave">Earned Leave</option>
        <option value="Maternity/Paternity Leave">Maternity/Paternity Leave</option>
      </select>

      <label for="startDate">Start Date:</label>
      <input type="date" id="startDate" name="startDate" required>

      <label for="endDate">End Date:</label>
      <input type="date" id="endDate" name="endDate" required>

     

      <button type="submit">Submit Request</button>
      <button type="button" class="cancel-button" onclick="clearForm()">Cancel</button>
    </form>
  </div>


  <script>
    document.getElementById("leaveForm").addEventListener("submit", function(event) {
      event.preventDefault();
      alert("Leave request submitted successfully!");
      this.reset(); // Clear form after submission
    });

    function clearForm() {
      document.getElementById("leaveForm").reset();
    }

    
  </script>
</body>
</html>
