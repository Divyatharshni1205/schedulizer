<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timetable Scheduling Dashboard</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Global Styles */
      body {
        background-image: url("schedulizer.png"); /* Replace with your image path */
        background-size: cover; /* Ensures the image covers the entire screen */
        background-position: center;
        margin: 0;
        font-family: "Roboto", sans-serif;
        background-color: #f4f4f9;
        display: flex;
      }

      /* Sidebar */
      .sidebar {
        width: 200px;
        background: #333;
        color: white;
        height: 100vh;
        padding: 20px;
        position: fixed;
      }

      .sidebar h2 {
        text-align: center;
        margin-bottom: 20px;
      }

      .sidebar ul {
        list-style: none;
        padding: 0;
      }

      .sidebar ul li {
        padding: 15px;
        margin-bottom: 10px;
        cursor: pointer;
        border-left: 2px solid transparent;
        transition: background 0.3s, border-color 0.3s;
      }

      .sidebar ul li:hover,
      .sidebar ul li.active {
        background: rgba(255, 255, 255, 0.2);
        border-left: 4px solid white;
      }

      .sidebar ul li a {
        text-decoration: none;
        color: white;
        display: block;
      }

      /* Main Content */
      .main {
        margin-left: 250px;
        padding: 20px;
        flex: 1;
        background: #f9f9fb;
      }

      .main h1 {
        margin: 0;
        font-size: 1.8rem;
        color: #333;
      }

      .content {
        margin-top: 20px;
        padding: 20px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }
      img {
            max-width: 120%;
            height: 80vh;
            width: 160vh;
            top:0;
            bottom:0;
            left:0;
            right:0;
            border-radius: 5px;
        }
    </style>
  </head>

  <body>
    <!-- Sidebar -->
    <div class="sidebar">
      <h2>SCHEDULIZER</h2>
      <ul>
        <li class="active"><a href="home.html">🏠 Home</a></li>
        <li><a href="courseallocation.html">👩‍🏫 Course Allocation</a></li>
        <li><a href="javas.html">📝 Timetable Inputs</a></li>
        <li><a href="schedules.html">📅 Schedules</a></li>
        <li><a href="leave-application.html">🛑 Staff Leave Application</a></li>
        <li><a href="logout.html">🚪 Logout</a></li>
      </ul>
    </div>

    <!-- Main Content -->
    <div class="main">
      
        <h1>Home</h1>
        <p>Welcome to your scheduling dashboard!</p>
        <img src="schedulizer.png" alt="Online Image">      


    </div>
  </body>
</html>
