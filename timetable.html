<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class Timetable Scheduler</title>
  <script src="function1.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #1b1b1f, #2b2b35);
      color: #ddd;
    }

    form {
      background: rgba(40, 40, 50, 0.95);
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.5);
      width: 90%;
      max-width: 900px;
    }

    h1, h2, h3, h4 {
      text-align: center;
      color: #f4f4f4;
    }

    .class-block {
      background: rgba(30, 30, 40, 0.95);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      margin-bottom: 15px;
      position: relative;
    }

    .remove-btn {
      background: #dc3545;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      margin-top: 10px;
      display: block;
      text-align: center;
      width: fit-content;
    }

    .remove-btn:hover {
      background: #c82333;
    }

    label {
      display: block;
      font-weight: bold;
      margin-top: 8px;
      color: #bbb;
    }

    input {
      width: calc(100% - 20px);
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #444;
      border-radius: 6px;
      outline: none;
      background: #222;
      color: #ddd;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: #282832;
      border-radius: 8px;
      overflow: hidden;
      color: rgb(19, 18, 18);
    }

    th, td {
      border: 1px solid #444;
      padding: 12px;
      text-align: center;
    }

    .timetable-header {
      background-color: #007bff;
      color: white;
      font-weight: bold;
    }

    .time-slot {
      cursor: pointer;
      transition: 0.3s ease-in-out;
      background-color: #333;
      color: white;
    }

    .time-slot:hover {
      background: rgba(255, 0, 0, 0.5);
    }

    .time-slot.blocked {
      background-color: #d9534f;
      color: white;
      font-weight: bold;
    }

    button {
      display: block;
      background: #007bff;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      text-align: center;
      margin-top: 15px;
      width: 100%;
    }

    button:hover {
      background: #0056b3;
    }

    .submit-button {
      background: #28a745;
    }

    .back-button {
      background: #ffc107;
      color: black;
      margin-top: 10px;
    }

    .back-button:hover {
      background: #e0a800;
    }

    .submit-button:hover {
      background: #218838;
    }
  </style>
</head>
<body>
  <form id="timetableForm">
    <h1>Class Timetable Scheduler</h1>

    <div id="classInputs"></div>

    <button type="button" onclick="addClass()">Add Another Class</button>
    <button type="submit" class="submit-button">Submit</button>
    <button type="button" class="back-button" onclick="goToHomePage()">Back to Home</button>

  </form>

  <script>
    function addClass() {
      let classContainer = document.getElementById('classInputs');

      let classBlock = document.createElement('div');
      classBlock.classList.add('class-block');
      classBlock.innerHTML = `
        <h2>Class Information</h2>
        <label>Class Name:</label>
        <input type="text" name="className[]" required>

        <label>Room Number:</label>
        <input type="text" name="roomNumber[]" required>

        <div class="subject-container"></div>
        <button type="button" onclick="addSubject(this)">Add Another Subject</button>
        <button type="button" class="remove-btn" onclick="removeElement(this)">Remove Class</button>
      `;

      classContainer.appendChild(classBlock);
    }

    function addSubject(button) {
      let subjectContainer = button.previousElementSibling;

      let subjectBlock = document.createElement('div');
      subjectBlock.classList.add('class-block');
      subjectBlock.innerHTML = `
        <h3>Subject Details</h3>
        <label>Subject Name:</label>
        <input type="text" name="subject[]" required>

        <label>Subject Code:</label>
        <input type="text" name="code[]" required>

        <label>Credits:</label>
        <input type="number" name="credits[]" required>

        <label>Lab Hours/Week:</label>
        <input type="number" name="labHours[]" required>

        <label>Normal Hours/Week:</label>
        <input type="number" name="normalHours[]" required>

        <label>Teacher Name:</label>
        <input type="text" name="teacherName[]" required>

        <label>Teacher ID:</label>
        <input type="text" name="teacherID[]" required>

        <h4>Blocked Time Slots</h4>
        <table class="timetable">
          <thead>
            <tr>
              <th class="timetable-header">Day</th>
              <th class="timetable-header">09 AM - 10 AM</th>
              <th class="timetable-header">10 AM - 11 AM</th>
              <th class="timetable-header">11 AM - 12 PM</th>
              <th class="timetable-header">12 PM - 01 PM</th>
              <th class="timetable-header">01 PM - 02 PM</th>
              <th class="timetable-header">02 PM - 03 PM</th>
              <th class="timetable-header">03 PM - 04 PM</th>
              <th class="timetable-header">04 PM - 05 PM</th>
            </tr>
          </thead>
          <tbody>
            ${['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'].map(day => `
              <tr>
                <td>${day}</td>
                ${Array(8).fill('<td class="time-slot"></td>').join('')}
              </tr>`).join('')}
          </tbody>
        </table>
        <button type="button" class="remove-btn" onclick="removeElement(this)">Remove Subject</button>
      `;

      subjectContainer.appendChild(subjectBlock);
      activateTimeSlots();
    }

    function removeElement(button) {
      button.parentElement.remove();
    }

    function goToHomePage() {
      window.location.href = "home.html"; // Change "index.html" to your actual homepage filename
    }

    function activateTimeSlots() {
      document.querySelectorAll('.time-slot').forEach(slot => {
        slot.onclick = function() {
          this.classList.toggle('blocked');
          this.textContent = this.classList.contains('blocked') ? 'Blocked' : '';
        };
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      addClass(); // Start with one class by default
    });
  </script>
</body>
</html>
